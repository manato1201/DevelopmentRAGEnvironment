# notion_bulk_add.py への入力サンプル
#
# 使い方:
#   uv run python scripts/notion_bulk_add.py --input scripts/notion_bulk_input.yaml --dry-run
#   uv run python scripts/notion_bulk_add.py --input scripts/notion_bulk_input.yaml
#
# フィールド説明:
#   title        : ページタイトル（必須）
#   db           : 投入先DB（tool_docs / game_info / research / team_notes）
#   tags         : タグ（Unity / Houdini / DX12 / C++ / Shader / VEX / Python / MCP / RAG / Environment）
#   source_url   : 元記事URL（省略可）
#   summary      : 100字要約（空にするとGeminiで自動生成）
#   md_path      : ローカルMarkdownパス（summaryが空の場合に使用）
#   collected_at : 追加日（省略すると今日）

