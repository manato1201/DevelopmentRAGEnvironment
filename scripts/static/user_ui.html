<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG チャット</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #242838;
    --border: #2e3348; --accent: #6c8ef7; --accent2: #4ade80;
    --warn: #f87171; --text: #e2e8f0; --muted: #64748b;
    --user-bubble: #1e3a5f; --bot-bubble: #1a1d27;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text);
         font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }

  /* ── ログイン画面 ── */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 20px; padding: 20px;
  }
  #login-screen h1 { font-size: 1.4rem; }
  #login-screen p { color: var(--muted); font-size: .9rem; text-align: center; }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px; width: 100%; max-width: 420px;
  }
  .login-card h2 { font-size: 1rem; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 5px; }
  input[type=text], input[type=password] {
    width: 100%; padding: 9px 12px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: .9rem; outline: none; transition: border .15s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: .85rem; font-weight: 600; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  #login-err { color: var(--warn); font-size: .8rem; display: none; }

  /* ── メインチャット ── */
  #chat-screen { display: none; flex-direction: column; height: 100%; }

  /* ヘッダー */
  .chat-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .chat-header h1 { font-size: 1rem; font-weight: 600; }
  #user-info { margin-left: auto; font-size: .8rem; color: var(--muted); }
  #user-info strong { color: var(--text); }
  .ns-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .ns-tag { font-size: .7rem; padding: 2px 8px; border-radius: 99px;
            background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }
  .ns-tag.active { border-color: var(--accent); color: var(--accent); }
  .logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); padding: 4px 10px; cursor: pointer; font-size: .75rem;
  }
  .logout-btn:hover { color: var(--text); border-color: var(--text); }

  /* メッセージエリア */
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg { display: flex; gap: 12px; max-width: 800px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem; font-weight: 700;
  }
  .avatar.user { background: var(--accent); }
  .avatar.bot  { background: var(--bg3); border: 1px solid var(--border); }
  .bubble {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; font-size: .9rem; line-height: 1.6;
    max-width: calc(100% - 48px);
  }
  .msg.user .bubble { background: var(--user-bubble); border-color: #2d4a7a; }
  .bubble pre { background: var(--bg3); border-radius: 5px; padding: 8px; overflow-x: auto; margin-top: 8px; }
  .bubble code { font-family: monospace; font-size: .85rem; }

  /* ソース */
  .sources { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .sources-label { font-size: .72rem; color: var(--muted); margin-bottom: 4px; }
  .source-item { font-size: .72rem; color: var(--accent); }

  /* 入力エリア */
  .input-area {
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 16px 20px; flex-shrink: 0;
  }
  .input-row { display: flex; gap: 8px; max-width: 800px; margin: 0 auto; }
  textarea {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 10px 14px;
    font-size: .9rem; resize: none; outline: none; min-height: 44px;
    max-height: 140px; overflow-y: auto; transition: border .15s;
    font-family: inherit;
  }
  textarea:focus { border-color: var(--accent); }
  #send-btn {
    background: var(--accent); border: none; border-radius: 8px; color: #fff;
    padding: 0 18px; cursor: pointer; font-size: 1.1rem; transition: opacity .15s;
    flex-shrink: 0;
  }
  #send-btn:disabled { opacity: .4; cursor: default; }

  /* ローディング */
  .typing { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* フラッシュ */
  #flash { position: fixed; top: 16px; right: 16px; z-index: 200;
           padding: 10px 18px; border-radius: 8px; font-size: .85rem; display: none; }
  #flash.err { background: #450a0a; border: 1px solid var(--warn); color: var(--warn); }
</style>
</head>
<body>

<div id="flash"></div>

<!-- ── ログイン ── -->
<div id="login-screen">
  <div>
    <h1>🔍 RAG チャット</h1>
    <p>API キーを入力してログインしてください</p>
  </div>
  <div class="login-card">
    <h2>ログイン</h2>
    <div class="form-group">
      <label>API キー</label>
      <input type="password" id="api-key-input" placeholder="管理者から発行された API キー"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <div id="login-err">キーが無効です。管理者にお問い合わせください。</div>
    <button class="btn btn-primary" onclick="login()" style="margin-top:4px">ログイン</button>
  </div>
</div>

<!-- ── チャット ── -->
<div id="chat-screen">
  <div class="chat-header">
    <h1>🔍 RAG チャット</h1>
    <div class="ns-tags" id="ns-tags"></div>
    <div id="user-info"></div>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
  <div id="messages">
    <div class="msg bot">
      <div class="avatar bot">🤖</div>
      <div class="bubble">
        こんにちは！ゲーム開発の知識ベースに質問できます。<br>
        Unity、Houdini、技術調査などについて聞いてください。
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="質問を入力... (Shift+Enter で改行)" rows="1"
                oninput="autoResize(this)"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="send-btn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
let API_KEY = localStorage.getItem('user_api_key') || '';
let USER = null;
let HISTORY = [];

/* ── 起動時 ── */
window.addEventListener('DOMContentLoaded', () => {
  if (API_KEY) tryAutoLogin();
  else document.getElementById('api-key-input').focus();
});

async function tryAutoLogin() {
  const ok = await verifyKey(API_KEY);
  if (!ok) { API_KEY = ''; localStorage.removeItem('user_api_key'); }
}

async function login() {
  const input = document.getElementById('api-key-input');
  API_KEY = input.value.trim();
  if (!API_KEY) return;
  const ok = await verifyKey(API_KEY);
  if (!ok) {
    document.getElementById('login-err').style.display = 'block';
    API_KEY = '';
  } else {
    localStorage.setItem('user_api_key', API_KEY);
  }
}

async function verifyKey(key) {
  try {
    const r = await fetch(BASE + '/api/me', { headers: { 'X-API-Key': key } });
    if (!r.ok) return false;
    USER = await r.json();
    renderChatHeader();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('user-input').focus();
    return true;
  } catch { return false; }
}

function renderChatHeader() {
  document.getElementById('user-info').innerHTML =
    `ログイン中: <strong>${USER.display_name}</strong>`;
  const tags = document.getElementById('ns-tags');
  const ns = USER.allowed_namespaces || [];
  tags.innerHTML = ns.map(n =>
    `<span class="ns-tag active">${n}</span>`
  ).join('') || '<span class="ns-tag">制限なし</span>';
}

function logout() {
  localStorage.removeItem('user_api_key');
  API_KEY = ''; USER = null; HISTORY = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('api-key-input').value = '';
  document.getElementById('login-err').style.display = 'none';
  clearMessages();
}

/* ── チャット ── */
async function send() {
  const textarea = document.getElementById('user-input');
  const query = textarea.value.trim();
  if (!query) return;
  textarea.value = '';
  autoResize(textarea);

  appendMsg('user', query);
  HISTORY.push({ role: 'user', text: query });

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  const typingEl = appendTyping();

  try {
    const r = await fetch(BASE + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify({ query, history: HISTORY, limit: 5 }),
    });
    const data = await r.json();
    typingEl.remove();

    if (!r.ok) {
      appendMsg('bot', `❌ ${data.error || 'エラーが発生しました'}`);
      if (r.status === 401) { flash('セッションが切れました。再ログインしてください'); logout(); }
      return;
    }
    appendMsg('bot', data.answer, data.sources || []);
    HISTORY.push({ role: 'bot', text: data.answer });
    if (HISTORY.length > 20) HISTORY = HISTORY.slice(-20);
  } catch (e) {
    typingEl.remove();
    appendMsg('bot', `❌ 接続エラー: ${e.message}`);
  } finally {
    btn.disabled = false;
    document.getElementById('user-input').focus();
  }
}

function appendMsg(role, text, sources = []) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarChar = role === 'user' ? '👤' : '🤖';
  const formatted = formatText(text);
  let sourcesHtml = '';
  if (sources.length) {
    const items = sources.map(s => `<div class="source-item">📄 ${s.title} (${s.db})</div>`).join('');
    sourcesHtml = `<div class="sources"><div class="sources-label">参照ソース</div>${items}</div>`;
  }
  div.innerHTML = `
    <div class="avatar ${role}">${avatarChar}</div>
    <div class="bubble">${formatted}${sourcesHtml}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function clearMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="msg bot">
      <div class="avatar bot">🤖</div>
      <div class="bubble">
        こんにちは！ゲーム開発の知識ベースに質問できます。<br>
        Unity、Houdini、技術調査などについて聞いてください。
      </div>
    </div>
  `;
}

/* ── テキスト整形（マークダウン風） ── */
function formatText(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h4 style="margin-top:8px;font-size:.9rem">$1</h4>')
    .replace(/^## (.+)$/gm,  '<h3 style="margin-top:8px;font-size:.95rem">$1</h3>')
    .replace(/^# (.+)$/gm,   '<h2 style="margin-top:8px;font-size:1rem">$1</h2>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul style="padding-left:18px;margin:4px 0">${m}</ul>`)
    .replace(/\n/g, '<br>');
}

/* ── ユーティリティ ── */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function flash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.className = 'err';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
