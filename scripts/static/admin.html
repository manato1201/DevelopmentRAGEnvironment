<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 管理画面</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #242838;
    --border: #2e3348; --accent: #6c8ef7; --accent2: #4ade80;
    --warn: #f87171; --text: #e2e8f0; --muted: #64748b;
    --admin: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ── ヘッダー ── */
  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .badge { font-size: .7rem; padding: 2px 8px; border-radius: 99px;
           background: var(--accent); color: #fff; font-weight: 700; }
  #server-status { margin-left: auto; font-size: .8rem; }
  #server-status .dot { display: inline-block; width: 8px; height: 8px;
                        border-radius: 50%; margin-right: 6px; background: var(--muted); }
  #server-status.ok .dot { background: var(--accent2); }
  #server-status.err .dot { background: var(--warn); }

  /* ── メインレイアウト ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

  /* ── カード ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border);
                 display: flex; justify-content: space-between; align-items: center; }
  .card-header h2 { font-size: .95rem; font-weight: 600; }
  .card-body { padding: 18px; }

  /* ── フォーム ── */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 5px; }
  input[type=text], select {
    width: 100%; padding: 8px 12px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: .9rem; outline: none;
    transition: border .15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  .ns-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .ns-check label {
    display: flex; align-items: center; gap: 5px;
    font-size: .8rem; color: var(--text); cursor: pointer;
    background: var(--bg3); padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); transition: border .15s, background .15s;
  }
  .ns-check input[type=checkbox] { accent-color: var(--accent); }
  .ns-check label:has(input:checked) { border-color: var(--accent); background: #1e2a4a; }

  /* ── ボタン ── */
  .btn {
    padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
    font-size: .85rem; font-weight: 600; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--warn);   color: #fff; }
  .btn-warn    { background: var(--admin);  color: #000; }
  .btn-sm { padding: 4px 10px; font-size: .75rem; }

  /* ── テーブル ── */
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { padding: 8px 12px; text-align: left; color: var(--muted);
       border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .tag { display: inline-block; font-size: .7rem; padding: 2px 7px;
         border-radius: 99px; margin: 1px; background: var(--bg3); border: 1px solid var(--border); }
  .admin-tag { background: #3d2906; border-color: var(--admin); color: var(--admin); }

  /* ── API キーモーダル ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 100; align-items: center; justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
           padding: 28px; max-width: 500px; width: 90%; }
  .modal h3 { margin-bottom: 16px; font-size: 1rem; }
  .key-box {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 12px; font-family: monospace; font-size: .9rem; word-break: break-all;
    color: var(--accent2); margin-bottom: 12px;
  }
  .modal-note { font-size: .8rem; color: var(--warn); margin-bottom: 16px; }

  /* ── ログテーブル ── */
  #log-table { font-size: .78rem; }
  #log-table td:nth-child(4) { max-width: 240px; overflow: hidden;
                                text-overflow: ellipsis; white-space: nowrap; }

  /* ── フラッシュ ── */
  #flash { position: fixed; top: 16px; right: 16px; z-index: 200;
           padding: 10px 18px; border-radius: 8px; font-size: .85rem;
           display: none; font-weight: 600; }
  #flash.ok  { background: #14532d; border: 1px solid var(--accent2); color: var(--accent2); }
  #flash.err { background: #450a0a; border: 1px solid var(--warn); color: var(--warn); }

  /* ── タブ ── */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab-btn {
    padding: 8px 18px; background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: .9rem; border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
</style>
</head>
<body>

<header>
  <h1>🛡 RAG 管理画面</h1>
  <span class="badge">Admin</span>
  <div id="server-status">
    <span class="dot"></span><span id="status-text">接続中...</span>
  </div>
</header>

<div id="flash"></div>

<!-- API キー表示モーダル -->
<div id="modal-overlay">
  <div class="modal">
    <h3>✅ ユーザー作成完了</h3>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:10px;">
      以下の API キーを今すぐコピーしてください。<br>再表示はできません。
    </p>
    <div class="key-box" id="modal-key">—</div>
    <p class="modal-note">⚠ このキーはこのダイアログを閉じると二度と確認できません</p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="copyKey()">📋 コピー</button>
      <button class="btn" style="background:var(--bg3)" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('users')">ユーザー管理</button>
    <button class="tab-btn" onclick="switchTab('logs')">アクセスログ</button>
    <button class="tab-btn" onclick="switchTab('audit')">監査ログ</button>
  </div>

  <!-- ユーザー管理タブ -->
  <div class="tab-pane active" id="tab-users">
    <div class="grid-2">

      <!-- 新規ユーザー作成 -->
      <div class="card">
        <div class="card-header"><h2>新規ユーザー作成</h2></div>
        <div class="card-body">
          <div class="form-group">
            <label>表示名</label>
            <input type="text" id="new-name" placeholder="例: Alice">
          </div>
          <div class="form-group">
            <label>アクセス可能な Namespace</label>
            <div class="ns-checkboxes" id="new-ns-checks"></div>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="new-is-admin" style="accent-color:var(--accent)">
              &nbsp; 管理者権限
            </label>
          </div>
          <button class="btn btn-primary" onclick="createUser()">作成</button>
        </div>
      </div>

      <!-- サーバー状態 -->
      <div class="card">
        <div class="card-header"><h2>サーバー状態</h2></div>
        <div class="card-body" id="health-info" style="font-size:.85rem;line-height:1.8;color:var(--muted)">
          読み込み中...
        </div>
      </div>

    </div>

    <!-- ユーザー一覧 -->
    <div class="card">
      <div class="card-header">
        <h2>ユーザー一覧</h2>
        <button class="btn btn-sm" style="background:var(--bg3)" onclick="loadUsers()">更新</button>
      </div>
      <div class="card-body" style="padding:0;overflow-x:auto;">
        <table id="user-table">
          <thead>
            <tr>
              <th>ID</th><th>名前</th><th>権限</th><th>Namespace</th>
              <th>最終アクセス</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="user-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 編集フォーム（インライン） -->
    <div class="card" id="edit-card" style="display:none;margin-top:20px;">
      <div class="card-header">
        <h2>ユーザー編集: <span id="edit-uid"></span></h2>
        <button class="btn btn-sm" style="background:var(--bg3)" onclick="document.getElementById('edit-card').style.display='none'">✕ 閉じる</button>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>表示名</label>
          <input type="text" id="edit-name">
        </div>
        <div class="form-group">
          <label>Namespace</label>
          <div class="ns-checkboxes" id="edit-ns-checks"></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
          <button class="btn btn-primary" onclick="saveEdit()">保存</button>
          <button class="btn btn-warn" onclick="regenKey()">🔑 キー再発行</button>
        </div>
      </div>
    </div>

  </div><!-- /tab-users -->

  <!-- ログタブ -->
  <div class="tab-pane" id="tab-logs">
    <div class="card">
      <div class="card-header">
        <h2>アクセスログ（直近200件）</h2>
        <button class="btn btn-sm" style="background:var(--bg3)" onclick="loadLogs()">更新</button>
      </div>
      <div class="card-body" style="padding:0;overflow-x:auto;">
        <table id="log-table">
          <thead>
            <tr><th>時刻</th><th>ユーザー</th><th>エンドポイント</th>
                <th>クエリ</th><th>NS</th><th>Status</th></tr>
          </thead>
          <tbody id="log-tbody"></tbody>
        </table>
      </div>
    </div>
  </div><!-- /tab-logs -->

  <!-- 監査ログタブ -->
  <div class="tab-pane" id="tab-audit">
    <div class="card">
      <div class="card-header">
        <h2>監査ログ（直近100件）</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-sm" style="background:var(--bg3)" onclick="loadAudit()">更新</button>
          <button class="btn btn-sm" style="background:var(--bg3)" onclick="downloadAuditCsv()">CSVダウンロード</button>
          <span id="audit-status" style="color:var(--muted);font-size:.75rem;"></span>
        </div>
      </div>
      <div class="card-body" style="padding:0;overflow-x:auto;">
        <table id="audit-table" style="width:100%;border-collapse:collapse;font-size:.78rem;">
          <thead>
            <tr>
              <th>Timestamp</th><th>Action</th><th>Namespace</th><th>Query Hash</th>
              <th style="text-align:right;">Latency(ms)</th>
              <th style="text-align:right;">Results</th>
              <th style="text-align:center;">Allowed</th>
            </tr>
          </thead>
          <tbody id="audit-tbody"></tbody>
        </table>
      </div>
    </div>
  </div><!-- /tab-audit -->

</div><!-- /container -->

<script>
const BASE = '';  // 同一オリジン
let ADMIN_KEY = localStorage.getItem('admin_api_key') || '';
let ALL_NS = [];
let EDIT_ID = null;

/* ── 初期化 ── */
window.addEventListener('DOMContentLoaded', () => {
  if (!ADMIN_KEY) {
    ADMIN_KEY = prompt('管理者 API キーを入力してください:') || '';
    if (ADMIN_KEY) localStorage.setItem('admin_api_key', ADMIN_KEY);
  }
  loadHealth();
  loadUsers();
  loadNS();
});

/* ── API ── */
async function api(method, path, body) {
  const opts = {
    method, headers: { 'X-API-Key': ADMIN_KEY, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  return { ok: r.ok, status: r.status, data: await r.json().catch(() => ({})) };
}

/* ── ヘルス ── */
async function loadHealth() {
  const { data, ok } = await api('GET', '/health');
  const el = document.getElementById('server-status');
  const txt = document.getElementById('status-text');
  if (ok && data.status === 'ok') {
    el.className = 'ok';
    txt.textContent = 'オンライン';
  } else {
    el.className = 'err';
    txt.textContent = 'オフライン';
  }
  const info = document.getElementById('health-info');
  info.innerHTML = `
    <div>ステータス: <strong style="color:${data.status==='ok'?'var(--accent2)':'var(--warn)'}">
      ${data.status || '不明'}</strong></div>
    <div>ドキュメント数: <strong>${data.total_chunks ?? '—'}</strong></div>
    <div>認証: <strong>${data.auth_enabled ? '有効' : '無効（開発モード）'}</strong></div>
  `;
}

/* ── Namespace ── */
async function loadNS() {
  const { data } = await api('GET', '/api/namespaces');
  ALL_NS = data.all || [];
  renderNSChecks('new-ns-checks', ALL_NS, []);
}

function renderNSChecks(containerId, all, selected) {
  const el = document.getElementById(containerId);
  el.innerHTML = all.map(ns =>
    `<span class="ns-check"><label>
      <input type="checkbox" value="${ns}" ${selected.includes(ns)?'checked':''}>
      ${ns}
    </label></span>`
  ).join('');
}

function getChecked(containerId) {
  return [...document.querySelectorAll(`#${containerId} input:checked`)].map(i => i.value);
}

/* ── ユーザー一覧 ── */
async function loadUsers() {
  const { data, ok } = await api('GET', '/api/users');
  if (!ok) { flash('ユーザー取得失敗（管理者キーを確認）', true); return; }
  const tbody = document.getElementById('user-tbody');
  tbody.innerHTML = '';
  (data.users || []).forEach(u => {
    const tr = document.createElement('tr');
    const ns = u.allowed_namespaces.map(n => `<span class="tag">${n}</span>`).join('') || '<span style="color:var(--muted)">なし</span>';
    const adminBadge = u.is_admin ? '<span class="tag admin-tag">Admin</span>' : '';
    const last = u.last_used ? u.last_used.slice(0,19).replace('T',' ') : '未使用';
    tr.innerHTML = `
      <td><code>${u.id}</code></td>
      <td>${u.display_name}</td>
      <td>${adminBadge}</td>
      <td>${ns}</td>
      <td style="color:var(--muted);font-size:.78rem">${last}</td>
      <td>
        <button class="btn btn-sm btn-primary" onclick="openEdit('${u.id}','${u.display_name}',${JSON.stringify(u.allowed_namespaces)})">編集</button>
        <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}','${u.display_name}')" style="margin-left:4px">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* ── ユーザー作成 ── */
async function createUser() {
  const name = document.getElementById('new-name').value.trim();
  const ns   = getChecked('new-ns-checks');
  const isAdmin = document.getElementById('new-is-admin').checked;
  if (!name) { flash('名前を入力してください', true); return; }
  const { ok, data } = await api('POST', '/api/users', { display_name: name, allowed_namespaces: ns, is_admin: isAdmin });
  if (!ok) { flash(data.error || '作成失敗', true); return; }
  document.getElementById('new-name').value = '';
  document.getElementById('new-is-admin').checked = false;
  renderNSChecks('new-ns-checks', ALL_NS, []);
  showModal(data.api_key);
  loadUsers();
}

/* ── 削除 ── */
async function deleteUser(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const { ok } = await api('DELETE', `/api/users/${id}`);
  flash(ok ? '削除しました' : '削除失敗', !ok);
  if (ok) loadUsers();
}

/* ── 編集 ── */
function openEdit(id, name, ns) {
  EDIT_ID = id;
  document.getElementById('edit-uid').textContent = id;
  document.getElementById('edit-name').value = name;
  renderNSChecks('edit-ns-checks', ALL_NS, ns);
  const card = document.getElementById('edit-card');
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth' });
}

async function saveEdit() {
  const name = document.getElementById('edit-name').value.trim();
  const ns   = getChecked('edit-ns-checks');
  const { ok, data } = await api('PUT', `/api/users/${EDIT_ID}`, { display_name: name, allowed_namespaces: ns });
  flash(ok ? '更新しました' : (data.error || '更新失敗'), !ok);
  if (ok) { loadUsers(); document.getElementById('edit-card').style.display = 'none'; }
}

async function regenKey() {
  if (!confirm('API キーを再発行しますか？旧キーは即時無効になります。')) return;
  const { ok, data } = await api('POST', `/api/users/${EDIT_ID}/regenerate`, {});
  if (!ok) { flash(data.error || '再発行失敗', true); return; }
  showModal(data.api_key || data.new_key || '—');
}

/* ── ログ ── */
async function loadLogs() {
  const { data, ok } = await api('GET', '/api/logs');
  if (!ok) { flash('ログ取得失敗', true); return; }
  const tbody = document.getElementById('log-tbody');
  tbody.innerHTML = '';
  (data.logs || []).forEach(lg => {
    const tr = document.createElement('tr');
    const ts = (lg.timestamp||'').slice(0,19).replace('T',' ');
    const sc = lg.status_code;
    const color = sc >= 400 ? 'var(--warn)' : sc >= 200 ? 'var(--accent2)' : 'var(--muted)';
    tr.innerHTML = `
      <td style="color:var(--muted);white-space:nowrap">${ts}</td>
      <td><code>${lg.user_id||'—'}</code></td>
      <td>${lg.endpoint||''}</td>
      <td title="${lg.query_text||''}">${(lg.query_text||'').slice(0,60)}</td>
      <td style="font-size:.72rem">${lg.namespaces||''}</td>
      <td style="color:${color}">${sc||''}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* ── タブ ── */
function switchTab(id) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'logs') loadLogs();
  if (id === 'audit') loadAudit();
}

/* ── モーダル ── */
function showModal(key) {
  document.getElementById('modal-key').textContent = key;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
async function copyKey() {
  const key = document.getElementById('modal-key').textContent;
  await navigator.clipboard.writeText(key);
  flash('コピーしました');
}

/* ── 監査ログ ── */
let _auditTimer = null;

async function loadAudit() {
  const r = await api('GET', '/admin/audit?limit=100');
  const tbody  = document.getElementById('audit-tbody');
  const status = document.getElementById('audit-status');
  if (!r.ok) {
    status.textContent = 'エラー: ' + (r.data.error || r.status);
    return;
  }
  const records = r.data.records || [];
  status.textContent = `${records.length}件 (${new Date().toLocaleTimeString()} 更新)`;
  tbody.innerHTML = records.map(row => {
    const denied = row.allowed === false;
    const bg     = denied ? 'background:#4a1a1a;' : '';
    const ts     = (row.timestamp || '').slice(0, 19).replace('T', ' ');
    return `<tr style="${bg}">
      <td style="color:var(--muted);white-space:nowrap;font-size:.72rem;">${ts}</td>
      <td>${row.action || '-'}</td>
      <td style="font-size:.72rem;">${row.namespace || '-'}</td>
      <td style="font-family:monospace;font-size:.72rem;">${row.query_hash || '-'}</td>
      <td style="text-align:right;">${row.latency_ms ?? '-'}</td>
      <td style="text-align:right;">${row.result_count ?? '-'}</td>
      <td style="text-align:center;">${denied ? '❌' : '✅'}</td>
    </tr>`;
  }).join('');
  clearTimeout(_auditTimer);
  _auditTimer = setTimeout(loadAudit, 30000);
}

function downloadAuditCsv() {
  const rows    = document.querySelectorAll('#audit-tbody tr');
  const headers = ['timestamp','action','namespace','query_hash','latency_ms','result_count','allowed'];
  const lines   = [headers.join(',')];
  rows.forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td')).map(td => `"${td.textContent.trim()}"`);
    lines.push(cells.join(','));
  });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([lines.join('\n')], {type: 'text/csv'}));
  a.download = `rag_audit_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

/* ── フラッシュ ── */
function flash(msg, isErr = false) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.className = isErr ? 'err' : 'ok';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>
